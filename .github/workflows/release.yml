name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/phranck/grat/internal/version.buildVersion=${VERSION}" \
            -o "dist/grat_${VERSION}_${GOOS}_${GOARCH}" ./cmd/grat
      - name: Attest release binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/grat_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: grat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true
      - name: Package Homebrew bottles
        env:
          TAG: ${{ github.ref_name }}
        run: scripts/build-homebrew-bottles.sh --version "$TAG" --input dist --output bottles
      - name: Create checksums
        run: |
          find dist bottles -type f \( -name 'grat_*' -o -name '*.bottle.tar.gz' \) | sort | xargs sha256sum | sed 's#  \(dist\|bottles\)/#  #' > dist/checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* bottles/* --clobber
          else
            gh release create "$TAG" dist/* bottles/* --title "grat $TAG" --generate-notes
          fi
      - name: Verify published Homebrew bottles
        env:
          TAG: ${{ github.ref_name }}
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: scripts/verify-homebrew-bottles.sh --version "$TAG" --base-url "$RELEASE_BASE_URL" --input bottles
